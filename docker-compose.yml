version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: research-brief-api
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - API_CORS_ORIGINS=${API_CORS_ORIGINS:-https://ai-research-assistant-production-1ef8.up.railway.app}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - CF_ACCOUNT_ID=${CF_ACCOUNT_ID}
      - CF_API_TOKEN=${CF_API_TOKEN}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    restart: unless-stopped

  # Optional: Redis for caching (uncomment if needed)
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   deploy:
  #     resources:
  #       limits:
  #         cpus: '0.5'
  #         memory: 512M

# volumes:
#   redis_data:

networks:
  default:
    name: research-brief-network